version: '3.8'

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    networks:
      - glms-network

  glms-backend-api:
    build:
      context: .
      dockerfile: PROG7311.API/Dockerfile
    container_name: glms-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=PROG7311Db;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - Jwt__Key=ThisIsMySuperSecretKeyForJWTTokens2026MustBeAtLeast32Chars
      - Jwt__Issuer=PROG7311.API
    depends_on:
      - sql-server-db
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glms-frontend-web:
    build:
      context: .
      dockerfile: PROG7311/Dockerfile
    container_name: glms-web
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ApiSettings__BaseUrl=http://glms-backend-api:8080
    depends_on:
      glms-backend-api:
        condition: service_healthy
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge
